{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <h1>{{ product.name }}</h1>
    <img src="{{ product.image_url }}" class="img-fluid" alt="{{ product.name }}">
    <p>{{ product.description }}</p>
    <p>Price: ${{ product.price }}</p>
    <a href="{% url 'carts:add_to_cart' product.id %}" class="btn btn-primary">Add to Cart</a>
</div>
{% endblock %}
